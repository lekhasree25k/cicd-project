# .github/workflows/ci.yml
# This file defines the CI/CD pipeline.
# GitHub automatically runs this on every push and pull request.

name: CI Pipeline - Python Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download your code onto the runner machine
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install the Python version you want
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Install your project dependencies (pytest, etc.)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Run all tests — if any test fails, the pipeline fails
      - name: Run tests with pytest
        run: |
          pytest test_app.py -v

      # Step 5 (Bonus): Run tests with coverage report
      - name: Run tests with coverage
        run: |
          pytest test_app.py -v --cov=app --cov-report=term-missing
